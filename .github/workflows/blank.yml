name: CI/CD Pipeline

on:
  push:
    branches:
      - main

env:
  IMAGE_NAME: avinashanand28/ci-cd-demo
  IMAGE_TAG: ${{ github.sha }}

jobs:
  build-test-push-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout code
      - name: Checkout code
        uses: actions/checkout@v4

      # 2️⃣ Set up Python environment
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # 3️⃣ Install dependencies & run tests
      - name: Install dependencies and Run Tests
        run: |
          pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          # Only run pytest if the directory exists to prevent early failure
          if [ -d "tests" ]; then pytest tests/; fi

      # 4️⃣ Set up Docker Buildx
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 5️⃣ Log in to Docker Hub (for the Runner)
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # 6️⃣ Build and push Docker image
      - name: Build and push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}, ${{ env.IMAGE_NAME }}:latest
          cache-from: type=registry,ref=${{ env.IMAGE_NAME }}:latest
          cache-to: type=inline

      # 7️⃣ Deploy to EC2 via SSH
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}  # Make sure this secret contains your .pem file content
          port: 22
          script: |
            # 1. Login to Docker on EC2 to allow pulling the image
            echo "${{ secrets.DOCKER_PASSWORD }}" | sudo docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

            # 2. Pull the specific version built in this workflow
            echo "Pulling image: ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}"
            sudo docker pull ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}

            # 3. Stop and remove the old container if it exists
            echo "Cleaning up old container..."
            sudo docker stop ci-cd-demo || true
            sudo docker rm ci-cd-demo || true

            # 4. Run the new container
            echo "Starting new container..."
            sudo docker run -d --name ci-cd-demo -p 5000:5000 ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}

            # 5. Optional: Prune old images to save disk space on EC2
            sudo docker image prune -f
            
            echo "Deployment complete!"
